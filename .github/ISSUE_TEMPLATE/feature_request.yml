name: "\u2728 功能建议"
description: 建议新增功能或改进现有功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请描述你的使用场景和期望方案。

  - type: textarea
    id: problem
    attributes:
      label: 问题或使用场景
      description: 描述你遇到的问题或想满足的使用场景（Is your feature request related to a problem?）
      placeholder: 在执行 XX 工作流时，我经常需要手动……
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 描述你期望的解决方案
      placeholder: 希望框架能自动……
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的其他替代方案或变通办法
      placeholder: 目前我通过手动执行 XX 来变通……

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      description: 该功能涉及框架的哪个部分？
      options:
        - Agent 定义 (core/agents/)
        - 工作流规则 (core/rules/)
        - Skill 知识库 (core/skills/)
        - 命令 (core/commands/)
        - 工具脚本 (tools/)
        - 项目模板 (templates/)
        - 文档 (docs/)
        - 其他
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 其他可能有助于理解需求的上下文信息（截图、参考链接等）
